<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QR Code Generator & Scanner</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js"></script>
  </head>
  <body>
    <div class="container">
      <h1>QR Code Web App</h1>
      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('generator')">
          QR Generator
        </button>
        <button class="tab-btn" onclick="switchTab('scanner')">
          QR Scanner
        </button>
      </div>

      <!-- Generator Tab -->
      <div id="generator" class="tab-content active">
        <input
          type="url"
          id="urlInput"
          placeholder="Enter URL (e.g., https://www.google.com)"
          value="www.whatsapp.com"
        />
        <button onclick="generateQR()">Generate QR</button>
        <div id="qrContainer" style="display: none">
          <img id="qrImg" alt="Generated QR Code" style="max-width: 300px" />
          <br />
          <button onclick="downloadQR()" id="downloadBtn">Download QR</button>
          <button onclick="copyQR()">Copy QR Image</button>
        </div>
      </div>

      <!-- Scanner Tab -->
      <div id="scanner" class="tab-content">
        <video
          id="video"
          width="300"
          height="300"
          autoplay
          style="display: none"
        ></video>
        <canvas
          id="canvas"
          width="300"
          height="300"
          style="display: none"
        ></canvas>
        <button onclick="startScanner()">Start Scanner</button>
        <button onclick="stopScanner()">Stop Scanner</button>
        <button onclick="scanImage()" style="display: none" id="scanBtn">
          Scan QR
        </button>
        <div id="result"></div>
      </div>
    </div>
    <script src="{{ url_for('static', filename='js/scanner.js') }}"></script>
  </body>
</html>
